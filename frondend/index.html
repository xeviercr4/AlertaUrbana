<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Smart City IA</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="rag.css">
</head>

<body>

<!-- Navigation menu -->
<nav class="main-nav">
  <div class="nav-brand">🏙️ SmartCity AI</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">🎫 Ticket System</a>
    <a href="rag.html" class="nav-link">🤖 RAG Assistant</a>
  </div>

<div class="container">

<h1>🏙️ Smart City</h1>
<p>Reporte ciudadano inteligente</p>

<label>Describe el problema</label>
<textarea id="texto"></textarea>

<label>Subir imagen (opcional)</label>
<input type="file" id="imagen" accept="image/*">

<img id="preview" class="preview"/>

<button id="btnEnviar">Enviar Reporte</button>

<div id="ticketResultado"></div>

<h2>📋 Historial</h2>
<button onclick="cargarTickets()">Actualizar</button>
<div id="historial"></div>

<h2>🔍 Búsqueda Inteligente</h2>
<input type="text" id="consultaBusqueda" placeholder="Describe lo que buscas...">
<button id="btnBuscar">Buscar</button>
<div id="resultadosBusqueda"></div>

</div>

<script src="app.js"></script>
