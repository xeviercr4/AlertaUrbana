<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Smart City IA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav style="background:#0078D4;padding:12px 30px;display:flex;gap:20px;">
    <a href="/" style="color:#fff;text-decoration:none;font-weight:500;padding:6px 14px;border-radius:6px;background:rgba(255,255,255,0.25);">Reportes</a>
    <a href="/chat.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:6px 14px;border-radius:6px;">Chat RAG</a>
    <a href="/documentos.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;padding:6px 14px;border-radius:6px;">Documentos</a>
</nav>

<div class="container">

<h1>🏙️ Smart City</h1>
<p>Reporte ciudadano inteligente</p>

<label>Describe el problema</label>
<textarea id="texto"></textarea>

<label>Subir imagen (opcional)</label>
<input type="file" id="imagen" accept="image/*">

<img id="preview" class="preview"/>

<button id="btnEnviar">Enviar Reporte</button>

<div id="ticketResultado"></div>

<h2>📋 Historial</h2>
<button onclick="cargarTickets()">Actualizar</button>
<div id="historial"></div>

<h2>🔍 Búsqueda Inteligente</h2>
<input type="text" id="consultaBusqueda" placeholder="Describe lo que buscas...">
<button id="btnBuscar">Buscar</button>
<div id="resultadosBusqueda"></div>

</div>

<script src="app.js"></script>

</body>
</html>
